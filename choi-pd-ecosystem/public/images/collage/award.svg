<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A237E"/>
      <stop offset="100%" stop-color="#00897B"/>
    </linearGradient>
    <radialGradient id="medal-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFD700" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#FFD700" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg3)"/>
  <rect width="800" height="600" fill="url(#medal-glow)"/>

  <!-- 메달 (리본 + 원형) -->
  <g transform="translate(400, 220)">
    <!-- 리본 -->
    <path d="M -50 -120 L -30 -50 L -50 30 L -70 -50 Z" fill="#D32F2F" stroke="white" stroke-width="2"/>
    <path d="M 50 -120 L 70 -50 L 50 30 L 30 -50 Z" fill="#D32F2F" stroke="white" stroke-width="2"/>
    <!-- 메달 -->
    <circle cx="0" cy="20" r="90" fill="#FFD700" stroke="white" stroke-width="4"/>
    <circle cx="0" cy="20" r="70" fill="none" stroke="#B8860B" stroke-width="3"/>
    <!-- 별 -->
    <path d="M 0 -30 L 12 -6 L 40 -2 L 20 16 L 24 42 L 0 30 L -24 42 L -20 16 L -40 -2 L -12 -6 Z" fill="#B71C1C"/>
  </g>

  <!-- 상단 태그 -->
  <rect x="40" y="40" width="120" height="36" rx="18" fill="rgba(255,255,255,0.2)" stroke="rgba(255,255,255,0.4)"/>
  <text x="56" y="64" font-family="'Pretendard', sans-serif" font-size="14" font-weight="700" fill="white">수상·인증</text>

  <!-- 수상 기관 로고 영역 (텍스트 로고) -->
  <g transform="translate(100, 390)">
    <rect x="0" y="0" width="280" height="48" rx="8" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.25)"/>
    <text x="140" y="32" font-family="'Pretendard', sans-serif" font-size="18" font-weight="800" fill="white" text-anchor="middle">🏛 서울특별시</text>
  </g>
  <g transform="translate(420, 390)">
    <rect x="0" y="0" width="280" height="48" rx="8" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.25)"/>
    <text x="140" y="32" font-family="'Pretendard', sans-serif" font-size="18" font-weight="800" fill="white" text-anchor="middle">PRESS AWARDS</text>
  </g>

  <!-- 하단 텍스트 -->
  <rect x="0" y="460" width="800" height="140" fill="rgba(0,0,0,0.55)"/>
  <text x="40" y="515" font-family="'Pretendard', sans-serif" font-size="30" font-weight="800" fill="white">서울시 대상 수상</text>
  <text x="40" y="550" font-family="'Pretendard', sans-serif" font-size="16" font-weight="500" fill="rgba(255,255,255,0.85)">서울시 청소년지도자 대상 사회봉사상 · 제17회</text>
  <text x="40" y="580" font-family="'Pretendard', sans-serif" font-size="13" font-weight="600" fill="#FFD700">15년간 지속된 청소년 미디어 교육 공로</text>
</svg>
