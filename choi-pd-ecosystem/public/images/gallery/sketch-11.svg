  <circle cx="500" cy="200" r="2" fill="rgba(255,255,255,0.2)"/>
  <circle cx="100" cy="300" r="1.5" fill="rgba(255,255,255,0.15)"/>
  <!-- Title -->
  <text x="300" y="490" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-family="system-ui" font-size="18" font-weight="700">뮤직 페스티벌</text>
  <text x="300" y="520" text-anchor="middle" fill="rgba(255,255,255,0.35)" font-family="system-ui" font-size="11">K-Entertainment Story</text>
