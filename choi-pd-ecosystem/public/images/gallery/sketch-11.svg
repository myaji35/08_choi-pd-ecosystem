      <stop offset="0%" style="stop-color:#0f3460"/>
      <stop offset="100%" style="stop-color:#e94560"/>
    </linearGradient>
    <radialGradient id="spot10" cx="50%" cy="40%" r="40%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.15)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0)"/>
    </radialGradient>
  </defs>
  <rect width="600" height="600" fill="url(#bg10)"/>
  <rect width="600" height="600" fill="url(#spot10)"/>
  <!-- Stage light beams -->
  <line x1="300" y1="0" x2="200" y2="400" stroke="rgba(255,255,255,0.04)" stroke-width="60"/>
  <line x1="300" y1="0" x2="400" y2="400" stroke="rgba(255,255,255,0.04)" stroke-width="60"/>
  <!-- Silhouette figure -->
  <circle cx="300" cy="230" r="35" fill="rgba(255,255,255,0.12)"/>
  <path d="M265 310 Q265 270, 300 270 Q335 270, 335 310 L340 420 L260 420 Z" fill="rgba(255,255,255,0.08)"/>
  <!-- Star sparkles -->
  <circle cx="150" cy="120" r="2" fill="rgba(255,255,255,0.3)"/>
