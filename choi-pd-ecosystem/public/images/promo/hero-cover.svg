<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
  <defs>
    <!-- 브랜드 그라디언트 -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D32F2F"/>
      <stop offset="45%" stop-color="#B71C1C"/>
      <stop offset="100%" stop-color="#1A237E"/>
    </linearGradient>
    <radialGradient id="glow" cx="75%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#FF6F00" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#FF6F00" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="20%" cy="80%" r="40%">
      <stop offset="0%" stop-color="#00897B" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#00897B" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" x="0" y="0" width="80" height="80" patternUnits="userSpaceOnUse">
      <path d="M 80 0 L 0 0 0 80" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- 배경 -->
  <rect width="1920" height="1080" fill="url(#bg)"/>
  <rect width="1920" height="1080" fill="url(#grid)"/>
  <rect width="1920" height="1080" fill="url(#glow)"/>
  <rect width="1920" height="1080" fill="url(#glow2)"/>

  <!-- 장식 원형 블러 오브 -->
  <circle cx="1650" cy="220" r="280" fill="rgba(255,255,255,0.06)"/>
  <circle cx="280" cy="880" r="220" fill="rgba(255,255,255,0.05)"/>

  <!-- 상단 배지 줄 -->
  <g transform="translate(120, 120)">
    <rect x="0" y="0" width="220" height="44" rx="22" fill="#00897B"/>
    <circle cx="24" cy="22" r="5" fill="#B7F5C9"/>
    <text x="44" y="29" font-family="'Pretendard', 'Apple SD Gothic Neo', sans-serif" font-size="14" font-weight="700" fill="white" letter-spacing="1.2">LIVE · CHOI PD</text>

    <rect x="240" y="0" width="260" height="44" rx="22" fill="white"/>
    <text x="264" y="29" font-family="'Pretendard', sans-serif" font-size="14" font-weight="800" fill="#00A1E0">✓ imPD 검증 회원 · 2026</text>

    <rect x="520" y="0" width="180" height="44" rx="22" fill="rgba(0,0,0,0.28)" stroke="rgba(255,255,255,0.25)"/>
    <text x="544" y="29" font-family="'Pretendard', sans-serif" font-size="14" font-weight="700" fill="white">팔로워 2,412명</text>
  </g>

  <!-- 메인 이름 -->
  <text x="120" y="420" font-family="'Pretendard', 'Apple SD Gothic Neo', sans-serif" font-size="180" font-weight="900" fill="white" letter-spacing="-8" style="text-shadow: 0 4px 24px rgba(0,0,0,0.4);">
    최범희 PD
  </text>

  <!-- 직함 -->
  <text x="126" y="490" font-family="'Pretendard', sans-serif" font-size="32" font-weight="500" fill="rgba(255,255,255,0.92)">
    교육인 · 1인미디어 크리에이터 · 강사
  </text>
  <text x="126" y="530" font-family="'Pretendard', sans-serif" font-size="22" font-weight="400" fill="rgba(255,255,255,0.75)">
    최PD의 희스토리 · 스마트폰교실 · 해양경찰교육원 강사
  </text>

  <!-- 슬로건 -->
  <line x1="120" y1="600" x2="120" y2="680" stroke="rgba(255,255,255,0.4)" stroke-width="3"/>
  <text x="142" y="648" font-family="'Pretendard', sans-serif" font-size="30" font-weight="600" fill="white">
    "스마트폰으로 사진·동영상·글을 만들어
  </text>
  <text x="142" y="688" font-family="'Pretendard', sans-serif" font-size="30" font-weight="600" fill="white">
    홍보 마케팅 콘텐츠를 제작합니다"
  </text>

  <!-- KPI 3장 -->
  <g transform="translate(120, 760)">
    <rect x="0" y="0" width="240" height="128" rx="16" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.22)" stroke-width="1.5"/>
    <text x="24" y="62" font-family="'Pretendard', sans-serif" font-size="48" font-weight="900" fill="white">15년</text>
    <text x="24" y="98" font-family="'Pretendard', sans-serif" font-size="15" font-weight="500" fill="rgba(255,255,255,0.75)">PD 경력</text>

    <rect x="260" y="0" width="240" height="128" rx="16" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.22)" stroke-width="1.5"/>
    <text x="284" y="62" font-family="'Pretendard', sans-serif" font-size="48" font-weight="900" fill="white">2회</text>
    <text x="284" y="98" font-family="'Pretendard', sans-serif" font-size="15" font-weight="500" fill="rgba(255,255,255,0.75)">공식 수상</text>

    <rect x="520" y="0" width="240" height="128" rx="16" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.22)" stroke-width="1.5"/>
    <text x="544" y="62" font-family="'Pretendard', sans-serif" font-size="48" font-weight="900" fill="white">B2G</text>
    <text x="544" y="98" font-family="'Pretendard', sans-serif" font-size="15" font-weight="500" fill="rgba(255,255,255,0.75)">공공기관 출강</text>
  </g>

  <!-- 하단 주소 라인 -->
  <text x="1800" y="1020" font-family="'JetBrains Mono', monospace" font-size="22" font-weight="600" fill="rgba(255,255,255,0.85)" text-anchor="end">
    impd.me/choi
  </text>

  <!-- 우측 하단 카메라 실루엣 장식 -->
  <g transform="translate(1500, 580)" opacity="0.12">
    <rect x="0" y="40" width="240" height="160" rx="12" fill="white"/>
    <rect x="80" y="20" width="80" height="30" rx="6" fill="white"/>
    <circle cx="120" cy="120" r="52" fill="none" stroke="#D32F2F" stroke-width="10"/>
    <circle cx="120" cy="120" r="28" fill="#D32F2F"/>
  </g>
</svg>
